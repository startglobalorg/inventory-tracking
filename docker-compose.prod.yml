services:
  inventory-app:
    container_name: inventory_app
    build:
      context: .
      dockerfile: Dockerfile
    image: inventory-app:latest
    pull_policy: build
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/app/sqlite-data/sqlite.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    volumes:
      - ./sqlite-data:/app/sqlite-data
